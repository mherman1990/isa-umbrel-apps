releaseNotes: >-
  Settings you asked for: edit your farm profile any time after setup
  (name, county, crops, tillage, cover-crop history), a Light/Dark/System
  theme, and an owner-only factory reset that wipes the box back to
  first-run. Plus the full accounting + agronomy expansion — Schedule F
  classification, a printable lender packet, a cash-flow projection with
  operating-line tracking, tap-to-allocate transactions,
  own-vs-cash-rent-vs-crop-share scenarios, MRTN nitrogen rate,
  fungicide-pass ROI, net practice economics, and a map-based field
  boundary editor (offline; aerial imagery opt-in). Every figure comes
  from your own records and cited data — gaps are shown, never guessed.
submitter: ISA
