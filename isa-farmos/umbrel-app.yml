releaseNotes: >-
  Re-release of the 0.2.0 accounting + agronomy expansion. The original
  farmos-v0.2.0 tag landed on the wrong commit and its image build was
  cancelled, so no 0.2.0 images ever shipped; 0.2.1 rebuilds the same work
  from the correct commit. Accounting: Schedule F line classification, a
  printable lender packet, a cash-flow projection with operating-line
  tracking, tap-to-allocate transactions, and
  own-vs-cash-rent-vs-crop-share scenarios. Agronomy: an economically
  optimal nitrogen rate (MRTN), fungicide-pass ROI, and net practice
  economics. Fields: a map-based boundary editor to draw and adjust field
  outlines (offline; aerial imagery is opt-in). Every figure comes from
  your own records and cited data — gaps are shown, never guessed.
submitter: ISA
