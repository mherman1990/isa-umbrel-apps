# Farm OS — Umbrel app compose.
#
# Three services + Umbrel's injected app_proxy:
#   web    — FastAPI API + PWA (port 8585)
#   worker — job queue (whisper transcription runs nice'd, single-flight,
#            max 2 threads: this box may also be running Bitcoin Core + LND
#            and Farm OS is a guest on that hardware)
#   db     — PostGIS (official multi-arch postgres base), small buffers
#
# All state lives under ${APP_DATA_DIR} (artifacts + secrets in ./data,
# postgres in ./postgres) — on Bitcorn-class hardware that's the NVMe.

version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: isa-farmos_web_1
      APP_PORT: 8585

  web:
    image: ghcr.io/mherman1990/farmos:0.2.1
    restart: on-failure
    stop_grace_period: 30s
    environment: &app_env
      FARMOS_DATA_DIR: /data
      # Fixed internal DB password: the db publishes no ports and is reachable
      # only on this app's private compose network, so a per-install secret
      # adds nothing (and ${APP_SEED} wasn't reliably substituted on Umbrel).
      FARMOS_DATABASE_URL: postgresql+psycopg://farmos:farmoslocaldbpw@isa-farmos_db_1:5432/farmos
    volumes:
      - ${APP_DATA_DIR}/data:/data
    depends_on:
      - db
    deploy:
      resources:
        limits:
          memory: 768M

  worker:
    image: ghcr.io/mherman1990/farmos:0.2.1
    command: ["worker"]
    restart: on-failure
    stop_grace_period: 30s
    environment: *app_env
    volumes:
      - ${APP_DATA_DIR}/data:/data
    depends_on:
      - db
    deploy:
      resources:
        limits:
          memory: 1024M # whisper.cpp base.en transient ~800MB

  db:
    image: ghcr.io/mherman1990/farmos-db:0.2.1
    restart: on-failure
    stop_grace_period: 1m
    command:
      - postgres
      - -c
      - shared_buffers=256MB
      - -c
      - work_mem=8MB
      - -c
      - max_connections=30
      - -c
      - effective_cache_size=512MB
    environment:
      POSTGRES_DB: farmos
      POSTGRES_USER: farmos
      POSTGRES_PASSWORD: farmoslocaldbpw
    volumes:
      - ${APP_DATA_DIR}/postgres:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 768M
