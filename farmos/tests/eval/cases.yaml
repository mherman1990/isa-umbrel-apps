# Voice-parser evaluation set (Hard Requirement #18a).
#
# Each case: a realistic in-cab transcript, the RECORDED model output
# (refreshed by live runs when the prompt or model pin changes), and the
# EXPECTED records. CI runs replay mode: recorded output → real
# post-processing (extract_json + validate_records) → scored against
# expected. Gate: record-level F1 >= 0.90.
#
# expected[].payload_match values: exact match, or {contains: "..."} for
# case-insensitive substring, or {any: true} for "must be present".

cases:
  - id: 001-spec-canonical-three-records
    transcript: >
      Just finished spraying the home eighty, Enlist One at 32 ounces, twenty
      gallons of water, started about two — wind was out of the south, maybe
      eight miles an hour. Oh, and the left boom section's dripping again,
      second time this month. Need to tell Dad we're low on Enlist, maybe two
      jugs left.
    recorded: |
      [{"target_type":"field_operation","confidence":0.85,"ambiguities":[{"key":"rate_basis","question":"32 oz per acre or total?","options":["oz/ac","oz total"]}],
        "payload":{"op_type":"spray","field_name":"home eighty","occurred_at_hint":"started about two",
                   "products":[{"name":"Enlist One","rate":32,"rate_unit":"oz/ac"}],
                   "details":{"carrier_gal_per_ac":20,"wind":"S 8 mph"}}},
       {"target_type":"equipment_issue","confidence":0.92,"ambiguities":[],
        "payload":{"equipment":"sprayer left boom section","issue":"dripping","recurring":true}},
       {"target_type":"input_inventory","confidence":0.9,"ambiguities":[],
        "payload":{"product_name":"Enlist One","observation":"low","quantity_hint":"two jugs left"}}]
    expected:
      - target_type: field_operation
        payload_match: { op_type: spray, field_name: { contains: "home eighty" }, products: { any: true } }
      - target_type: equipment_issue
        payload_match: { issue: { contains: "drip" }, recurring: true }
      - target_type: input_inventory
        payload_match: { product_name: { contains: "Enlist" }, observation: low }

  - id: 002-simple-planting
    transcript: >
      Planted the Miller place today, P1185 at thirty four five, finished
      about six tonight.
    recorded: |
      [{"target_type":"field_operation","confidence":0.9,"ambiguities":[],
        "payload":{"op_type":"plant","field_name":"Miller place","occurred_at_hint":"finished about six tonight",
                   "details":{"variety":"P1185","population":34500}}}]
    expected:
      - target_type: field_operation
        payload_match: { op_type: plant, field_name: { contains: "miller" }, details: { any: true } }

  - id: 003-harvest-yield-moisture
    transcript: >
      Wrapped up beans on the north forty, combine monitor said fifty eight
      and a half bushel, moisture right around twelve.
    recorded: |
      [{"target_type":"field_operation","confidence":0.9,"ambiguities":[],
        "payload":{"op_type":"harvest","field_name":"north forty",
                   "details":{"yield_bu_per_ac":58.5,"moisture_pct":12}}}]
    expected:
      - target_type: field_operation
        payload_match: { op_type: harvest, field_name: { contains: "north forty" } }

  - id: 004-tillage
    transcript: >
      Ran the vertical till across the creek bottom this afternoon, one pass,
      pretty mellow.
    recorded: |
      [{"target_type":"field_operation","confidence":0.88,"ambiguities":[],
        "payload":{"op_type":"till","field_name":"creek bottom","notes":"vertical till, one pass"}}]
    expected:
      - target_type: field_operation
        payload_match: { op_type: till, field_name: { contains: "creek bottom" } }

  - id: 005-scouting
    transcript: >
      Walked the west place, seeing waterhemp coming through in the low spots,
      maybe two three inches. Gonna need to spray this week.
    recorded: |
      [{"target_type":"field_operation","confidence":0.85,"ambiguities":[],
        "payload":{"op_type":"scout","field_name":"west place","notes":"waterhemp 2-3 inches in low spots"}},
       {"target_type":"note","confidence":0.8,"ambiguities":[],
        "payload":{"text":"needs spraying this week","about":"west place"}}]
    expected:
      - target_type: field_operation
        payload_match: { op_type: scout, field_name: { contains: "west" } }
      - target_type: note
        payload_match: { text: { contains: "spray" } }

