  - line: "14"
    name: Depreciation and section 179 expense
    categories: [depreciation, section_179, depr]
  - line: "15"
    name: Employee benefit programs
    categories: [employee_benefits, benefits]
  - line: "16"
    name: Feed
    categories: [feed]
  - line: "17"
