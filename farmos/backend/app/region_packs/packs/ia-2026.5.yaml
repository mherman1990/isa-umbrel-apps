# Iowa corn/soy region pack — v2026.1
#
# Program rules are DATA, not code. Every entry carries a citation,
# source_url, last_verified, and verify_by. Past verify_by the engine
# labels the entry "unverified since <date> — confirm before acting" and
# excludes it from ranking. Rates below were compiled 2026-07 from the
# sources cited; anything we could not confirm against a primary source is
# marked unverified: true rather than guessed.
#
# The federal tier is factored so future state packs can inherit it.

region_code: US-IA
version: "2026.5"
description: Iowa corn/soybean row-crop pack (pack #1)

programs:
  # ------------------------------------------------------------- federal
  - program_key: eqip
    name: Environmental Quality Incentives Program (EQIP)
    agency: NRCS
    tier: federal
    summary: >
      Cost-share for conservation practices on working land: cover crops,
      no-till/reduced-till transitions, nutrient management, terraces,
      grassed waterways. Payment schedules are set per state per practice.
    payment_rate: "Per-practice payment schedule (Iowa NRCS); cover crop commonly ~$30-60/ac depending on scenario"
    signup_deadline: "Continuous signup; state ranking cutoffs announced annually"
    source_url: https://www.nrcs.usda.gov/programs-initiatives/eqip-environmental-quality-incentives
    last_verified: 2026-07-12
    verify_by: 2027-03-01
    rules:
      - rule_key: agricultural_land
        description: Applicant must have an eligible land interest (owner or operator) in agricultural land.
        citation: 7 CFR 1466.6
        source_url: https://www.ecfr.gov/current/title-7/subtitle-B/chapter-XIV/subchapter-A/part-1466
        last_verified: 2026-07-12
        verify_by: 2027-03-01
        predicate: null
      - rule_key: conservation_compliance
        description: Must be in compliance with HEL (highly erodible land) and wetland (Swampbuster) provisions.
        citation: 7 CFR part 12
        source_url: https://www.ecfr.gov/current/title-7/subtitle-A/part-12
        last_verified: 2026-07-12
        verify_by: 2027-03-01
        predicate: null
      - rule_key: beginning_farmer_advantage
        description: Beginning farmers qualify for higher payment rates and advance payment options.
        citation: 16 U.S.C. 3839aa-2(d)(4)
        source_url: https://www.nrcs.usda.gov/getting-assistance/underserved-farmers-ranchers
        last_verified: 2026-07-12
        verify_by: 2027-03-01
        predicate: { attr: beginning_farmer, op: truthy, value: true }

  - program_key: csp
    name: Conservation Stewardship Program (CSP)
    agency: NRCS
    tier: federal
    summary: >
      Whole-operation annual stewardship payments plus enhancement payments
      for adding/improving practices. Suits operations already doing some
      conservation and willing to add more.
    payment_rate: "Annual payment by land use + enhancements; contract minimum $1,500/yr"
    signup_deadline: "Continuous; FY26 first ranking cutoff Jan 15 (spec-provided, confirm at state office)"
    signup_deadline_date: 2027-01-15
    source_url: https://www.nrcs.usda.gov/programs-initiatives/csp-conservation-stewardship-program
    last_verified: 2026-07-12
    verify_by: 2027-03-01
    rules:
      - rule_key: whole_operation
        description: Enrollment covers the entire agricultural operation.
        citation: 7 CFR 1470.5
        source_url: https://www.ecfr.gov/current/title-7/subtitle-B/chapter-XIV/subchapter-A/part-1470
        last_verified: 2026-07-12
        verify_by: 2027-03-01
        predicate: null
      - rule_key: stewardship_threshold
        description: Must meet or exceed the stewardship threshold for at least two priority resource concerns at enrollment.
        citation: 7 CFR 1470.6
        source_url: https://www.ecfr.gov/current/title-7/subtitle-B/chapter-XIV/subchapter-A/part-1470
        last_verified: 2026-07-12
        verify_by: 2027-03-01
        predicate: null

  - program_key: crp-continuous
    name: Conservation Reserve Program — Continuous (buffers, filter strips, habitat)
    agency: FSA
    tier: federal
    summary: >
      Annual rental payments for taking environmentally sensitive acres out
      of production: CP21 filter strips, CP22 riparian buffers, CP33 habitat
      buffers. Continuous signup, no ranking competition for eligible acres.
    payment_rate: "Annual soil rental rate by county + incentives; Iowa accepted 186,247 acres in 2026 enrollment (spec-provided)"
    signup_deadline: "Continuous signup"
    source_url: https://www.fsa.usda.gov/programs-and-services/conservation-programs/conservation-reserve-program
    last_verified: 2026-07-12
    verify_by: 2027-03-01
    rules:
      - rule_key: cropping_history
        description: Land generally must have been planted to an agricultural commodity 4 of the previous 6 crop years and be physically/legally capable of being cropped.
        citation: 7 CFR 1410.6
        source_url: https://www.ecfr.gov/current/title-7/subtitle-B/chapter-XIV/subchapter-B/part-1410
        last_verified: 2026-07-12
        verify_by: 2027-03-01
        predicate: null

  # ------------------------------------------------------------- state (Iowa)
  - program_key: idals-wqi-cover-crop
    name: IDALS Water Quality Initiative cover crop cost-share
    agency: IDALS
    tier: state
    summary: >
      State cost-share for seeding cover crops, administered through Soil &
      Water Conservation Districts. First-time users get the higher rate.
    payment_rate: "$30/ac first-time users; $20/ac returning users (spec-provided rates)"
    payment_per_acre: 30.00  # first-time rate; returning users get $20
    evidence_requirements:
      - req_key: cover-crop-seed-receipt
        practice_type: cover_crop
        artifact_kind: document
        subject: cover crop seed receipt or seeding invoice
        window_start_md: null
        window_end_md: null
        year_offset: -1
        verifier_grade_required: false
        description: Receipt/invoice documenting seed purchase or custom seeding for the enrolled acres.
        citation: SWCD cost-share claim documentation requirements
        source_url: https://www.cleanwateriowa.org/costshare
        last_verified: 2026-07-12
        verify_by: 2027-03-01
      - req_key: seeding-record
        practice_type: cover_crop
        artifact_kind: operation
        subject: seeding record with date and rate
        window_start_md: "08-15"
        window_end_md: "11-30"
        year_offset: -1
        verifier_grade_required: false
        description: A dated seeding operation record (species, rate, acres) inside the fall window.
        citation: SWCD cost-share practice requirements
        source_url: https://www.cleanwateriowa.org/costshare
        last_verified: 2026-07-12
        verify_by: 2027-03-01
    signup_deadline: "Apply at county SWCD; funds allocated summer/fall, first-come"
    source_url: https://www.cleanwateriowa.org/costshare
    last_verified: 2026-07-12
    verify_by: 2027-03-01
    rules:
      - rule_key: iowa_land
        description: Practice acres must be in Iowa.
        citation: Iowa Admin. Code 27-10 (financial incentive program)
        source_url: https://www.legis.iowa.gov/law/administrativeRules/rules?agency=27
        last_verified: 2026-07-12
        verify_by: 2027-03-01
        predicate: { attr: state, op: eq, value: IA }
      - rule_key: cover_crop_planned
        description: Applicant seeds a qualifying cover crop species this fall on the enrolled acres.
        citation: SWCD cost-share practice requirements (county SWCD)
        source_url: https://www.cleanwateriowa.org/costshare
        last_verified: 2026-07-12
        verify_by: 2027-03-01
        predicate: { attr: cover_crops, op: truthy, value: true }

  - program_key: idals-rma-insurance-discount
    name: Iowa Crop Insurance Discount Program (cover crop premium reduction)
    agency: IDALS/RMA
    tier: state
    summary: >
      $5/ac crop insurance premium reduction on acres with a fall-seeded
      cover crop followed by a spring cash crop. IMPORTANT STACKING RULE:
      acres enrolled in other state or federal cover crop cost-share
      programs are NOT eligible — this program and IDALS/EQIP cost-share
      are mutually exclusive on the same acres.
    payment_rate: "$5/ac premium reduction"
    payment_per_acre: 5.00
    signup_deadline: "Signup approximately Dec 1 - Jan 23 (spec-provided window; confirm annually)"
    signup_deadline_date: 2027-01-23
    source_url: https://iowaagriculture.gov/CropInsuranceDiscount
    last_verified: 2026-07-12
    verify_by: 2027-01-15
    rules:
      - rule_key: cover_crop_seeded
        description: Cover crop seeded in the fall on the enrolled acres, terminated ahead of a spring-planted cash crop.
        citation: IDALS Crop Insurance Discount Program terms
        source_url: https://iowaagriculture.gov/CropInsuranceDiscount
        last_verified: 2026-07-12
        verify_by: 2027-01-15
        predicate: { attr: cover_crops, op: truthy, value: true }
      - rule_key: no_other_cover_crop_program
        description: >
          Enrolled acres must NOT receive other state or federal cover crop
          cost-share (e.g. IDALS WQI cost-share, EQIP cover crop payments)
          for the same crop year. This is the canonical stacking exclusion.
        citation: IDALS Crop Insurance Discount Program eligibility terms
        source_url: https://iowaagriculture.gov/CropInsuranceDiscount
        last_verified: 2026-07-12
        verify_by: 2027-01-15
        predicate: { attr: enrolled_cover_crop_programs, op: eq, value: [] }

  - program_key: iowa-beginning-farmer-tax-credit
    name: Iowa Beginning Farmer Tax Credit (for landowners leasing to beginning farmers)
    agency: IFA/IADD
    tier: state
    summary: >
      Iowa tax credit to landowners who lease land, equipment, or buildings
      to a qualifying beginning farmer. Relevant to family succession and
      buy-in structures.
    payment_rate: "Tax credit of 5% (cash rent) or 15% (crop share) of lease value (confirm current rates)"
    signup_deadline: "Applications through the Iowa Finance Authority; annual award cap"
    source_url: https://www.iowafinance.com/beginning-farming-programs/
    last_verified: 2026-07-12
    verify_by: 2027-03-01
    rules:
      - rule_key: beginning_farmer_tenant
        description: Tenant must qualify as a beginning farmer (net worth cap, experience, Iowa resident).
        citation: Iowa Code ch. 16, subch. VIII, part 5
        source_url: https://www.legis.iowa.gov/law/iowaCode/chapters?title=I&year=2025
        last_verified: 2026-07-12
        verify_by: 2027-03-01
        predicate: { attr: beginning_farmer, op: truthy, value: true }

  # ------------------------------------------------------------- private / market
  - program_key: swof
    name: Soil and Water Outcomes Fund (SWOF)
    agency: SWOF (Iowa Soybean Association subsidiary)
    tier: private
    summary: >
      Outcome-based payments for water quality + carbon outcomes from
      practice changes (cover crops, tillage reduction, nutrient
      management). 25% up front, 75% after verification. Additionality
      applies: acres already receiving public cost-share for the same
      practice are typically excluded.
    payment_rate: "~$20-40/ac; 2024 average ~$33/ac (spec-provided)"
    payment_per_acre: 33.00  # 2024 average; actual is outcome-based
    evidence_requirements:
      - req_key: cover-crop-establishment-photo
        practice_type: cover_crop
        artifact_kind: photo
        subject: cover crop establishment photo
        window_start_md: "10-01"
        window_end_md: "12-15"
        year_offset: -1   # fall seeding before the enrollment crop year
        verifier_grade_required: true
        description: Geotagged photo of the established cover crop stand, taken in the fall seeding window.
        citation: SWOF verification requirements (typical MRV practice-evidence set)
        source_url: https://theoutcomesfund.com/farmers
        last_verified: 2026-07-12
        verify_by: 2027-03-01
      - req_key: cover-crop-termination-photo
        practice_type: cover_crop
        artifact_kind: photo
        subject: cover crop termination photo
        window_start_md: "04-01"
        window_end_md: "05-15"
        year_offset: 0
        verifier_grade_required: true
        description: Geotagged photo at/after termination ahead of the spring cash crop.
        citation: SWOF verification requirements (typical MRV practice-evidence set)
        source_url: https://theoutcomesfund.com/farmers
        last_verified: 2026-07-12
        verify_by: 2027-03-01
    signup_deadline: "Enrollment opens summer 2026 for crop year 2027 (spec-provided)"
    source_url: https://theoutcomesfund.com/
    last_verified: 2026-07-12
    verify_by: 2027-03-01
    rules:
      - rule_key: practice_change
        description: Payments require a new practice change (additionality) — acres already in the practice, or funded by other programs for it, may not qualify.
        citation: SWOF enrollment terms
        source_url: https://theoutcomesfund.com/farmers
        last_verified: 2026-07-12
        verify_by: 2027-03-01
        predicate: null

  - program_key: bayer-forground
    name: Bayer ForGround (reduced tillage / cover crop)
    agency: Bayer
    tier: private
    summary: >
      Practice-based payments for reduced tillage and cover crops, with
      historical-practice payments available for recent adopters.
    payment_rate: "~$6/ac reduced-till + ~$6/ac cover crop; up to ~$48/ac one-time historical (spec-provided; confirm current program terms)"
    payment_per_acre: 12.00  # both practices
    signup_deadline: "Rolling enrollment"
    source_url: https://www.bayerforground.com/
    last_verified: 2026-07-12
    verify_by: 2027-03-01
    unverified: true
    rules: []

  - program_key: pfi-cover-crop
    name: Practical Farmers of Iowa cover crop cost-share
    agency: Practical Farmers of Iowa
    tier: private
    summary: >
      PFI-administered cover crop cost-share (often stackable where public
      programs are not — check current-year terms).
    payment_rate: "Varies by year and funding partner"
    signup_deadline: "Annual; typically summer signup"
    source_url: https://practicalfarmers.org/programs/cover-crops/
    last_verified: 2026-07-12
    verify_by: 2027-03-01
    rules: []

# ---------------------------------------------------------------- stacking
# Whether two programs can pay on the SAME ACRES for the same crop year.
# Pairs with no rule on file are reported as "unknown — confirm with the
# administering agencies", never asserted either way.
stacking_rules:
  - rule_key: idals-discount-excludes-wqi
    program_a: idals-rma-insurance-discount
    program_b: idals-wqi-cover-crop
    relation: exclusive
    description: >
      The $5/ac crop insurance discount excludes acres receiving other
      state or federal cover crop cost-share — IDALS WQI cost-share on the
      same acres disqualifies them from the discount.
    citation: IDALS Crop Insurance Discount Program eligibility terms
    source_url: https://iowaagriculture.gov/CropInsuranceDiscount
    last_verified: 2026-07-12
    verify_by: 2027-01-15

  - rule_key: idals-discount-excludes-eqip
    program_a: idals-rma-insurance-discount
    program_b: eqip
    relation: exclusive
    description: >
      EQIP cover-crop payments are federal cost-share; acres receiving them
      are not eligible for the insurance discount in the same crop year.
    citation: IDALS Crop Insurance Discount Program eligibility terms
    source_url: https://iowaagriculture.gov/CropInsuranceDiscount
    last_verified: 2026-07-12
    verify_by: 2027-01-15

  - rule_key: swof-additionality-wqi
    program_a: swof
    program_b: idals-wqi-cover-crop
    relation: exclusive
    description: >
      SWOF outcome payments require additionality; acres taking public
      cover-crop cost-share for the same practice are typically excluded.
    citation: SWOF enrollment terms (additionality)
    source_url: https://theoutcomesfund.com/farmers
    last_verified: 2026-07-12
    verify_by: 2027-03-01

  - rule_key: swof-additionality-eqip
    program_a: swof
    program_b: eqip
    relation: exclusive
    description: >
      SWOF additionality: acres in EQIP cost-share for the same practice
      are typically excluded from outcome payments.
    citation: SWOF enrollment terms (additionality)
    source_url: https://theoutcomesfund.com/farmers
    last_verified: 2026-07-12
    verify_by: 2027-03-01

  - rule_key: wqi-stacks-with-eqip
    program_a: idals-wqi-cover-crop
    program_b: eqip
    relation: stackable
    description: >
      Federal and state cost-share can combine on the same acres where
      combined payments stay within program caps (spec-provided; confirm
      the current-year combined-rate cap with the county SWCD).
    citation: IDALS WQI cost-share guidance
    source_url: https://www.cleanwateriowa.org/costshare
    last_verified: 2026-07-12
    verify_by: 2027-03-01

  - rule_key: discount-stacks-with-swof
    program_a: idals-rma-insurance-discount
    program_b: swof
    relation: stackable
    description: >
      The insurance discount excludes COST-SHARE programs; SWOF is an
      outcome-based payment, not cost-share, so the combination is
      permitted under current terms (confirm annually — this is the
      highest-value pairing and the first one a rule change would break).
    citation: IDALS Crop Insurance Discount Program terms; SWOF enrollment terms
    source_url: https://iowaagriculture.gov/CropInsuranceDiscount
    last_verified: 2026-07-12
    verify_by: 2027-01-15


# ---------------------------------------------------------------- compliance
# Restricted-use pesticide recordkeeping (federal baseline for private
# applicators; Iowa Dept. of Ag enforces — legal record, immutable once
# confirmed, retained per the statute).
compliance:
  rup_retention_years: 2
  rup_required_fields:
    - product_name
    - epa_reg_number
    - total_amount
    - rate
    - location
    - area_size
    - crop
    - application_date
    - applicator_name
    - applicator_certification
  citation: 7 U.S.C. 136i-1 (federal private-applicator RUP records); Iowa Code ch. 206
  source_url: https://www.ecfr.gov/current/title-7/subtitle-B/chapter-I/part-110
  last_verified: 2026-07-12
  verify_by: 2027-07-01

# --------------------------------------------------------------- agronomy: N rate
# Corn N response as a quadratic-plateau per rotation, following the Iowa State
# Maximum Return To Nitrogen (MRTN) approach. The app derives the economically
# optimal rate from these coefficients + the farmer's prices at compute time.
#
# HONESTY FLAG: unverified: true. These coefficients are APPROXIMATED to
# reproduce published Iowa MRTN rates at recent price ratios; they are NOT a
# substitute for the ISU Corn Nitrogen Rate Calculator. The app surfaces the
# source_url and labels the output "confirm at the ISU calculator before
# applying." A human must re-fit/confirm against the primary source and clear
# this flag (same cadence as program verify_by).
mrtn:
  crop: corn
  unit: "lb N/ac"
  citation: "Iowa State University Corn Nitrogen Rate Calculator (MRTN); Sawyer et al., Concepts and Rationale for Regional N Rate Guidelines (PM 2015)"
  source_url: https://cnrc.agron.iastate.edu/
  last_verified: 2026-07-12
  verify_by: 2027-03-01
  unverified: true
  rotations:
    corn_after_soybean:
      label: "Corn following soybean"
      marginal_bu_per_lb: 0.85
      curvature: 0.00280
      agronomic_max_lb: 152
    corn_after_corn:
      label: "Corn following corn"
      marginal_bu_per_lb: 1.00
      curvature: 0.00250
      agronomic_max_lb: 200

# ------------------------------------------------------- agronomy: fungicide ROI
# Expected foliar-fungicide yield response (bu/ac) by disease-pressure scenario.
# HONESTY FLAG: unverified: true. Approximate ranges from public efficacy/yield-
# response summaries; actual response depends on hybrid/variety susceptibility,
# disease, growth stage, and weather. The app frames it as expected-value ROI
# and says "confirm the scenario before spending."
fungicide_roi:
  citation: "Crop Protection Network & ISU foliar fungicide efficacy / yield-response summaries"
  source_url: https://cropprotectionnetwork.org/publications
  last_verified: 2026-07-12
  verify_by: 2027-03-01
  unverified: true
  crops:
    corn:
      unit: "bu/ac"
      responses:
        low: 2.0
        moderate: 6.0
        high: 12.0
    soybeans:
      unit: "bu/ac"
      responses:
        low: 1.0
        moderate: 3.0
        high: 5.0
