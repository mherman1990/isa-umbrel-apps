# Farm OS image build — multi-arch (arm64 for the Pi 5 fleet + amd64 for CI/dev).
#
# Release ritual (namespaced `farmos-v*` tags so Bean Brief's `v*` workflow
# never cross-fires):
#   1. bump version in isa-farmos/umbrel-app.yml + isa-farmos/docker-compose.yml
#      (both image tags) + farmos/backend/pyproject.toml
#   2. update CHANGELOG.md
#   3. git tag farmos-vX.Y.Z && git push origin main --tags
name: build-farmos-image

on:
  push:
    tags: ["farmos-v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Derive version from tag
        id: ver
        run: |
          VERSION="${GITHUB_REF_NAME#farmos-v}"
          if [ "$GITHUB_REF_NAME" = "$VERSION" ]; then VERSION="dev"; fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: farmos/docker/Dockerfile
          platforms: linux/arm64,linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/farmos:${{ steps.ver.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/farmos:latest

      - name: Build and push db image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: farmos/docker/db.Dockerfile
          platforms: linux/arm64,linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/farmos-db:${{ steps.ver.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/farmos-db:latest
