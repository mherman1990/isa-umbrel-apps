releaseNotes: >-
  Signals, tailored reports, and a live market read. The Markets tab now opens with a market
  signals board — a bull/bear read at a glance across crop condition, drought, export pace, fund
  positioning, crush demand, feedstock share and more — plus a "Coming up" panel of imminent USDA
  reports. Charts default to the last six months with custom date ranges. Two new one-click
  reports join the lineup: an Analyst Note that reads forward and around the corner, and a Market
  Pulse — a short, time-sensitive read for farmers on what changed and what a marketer is weighing
  (it informs, it never advises). The homepage gains a "What changed" alert feed for material
  market moves, the News tab a daily distilled digest, and a data-health check flags any stale
  feed. Informational and nonpartisan throughout.
