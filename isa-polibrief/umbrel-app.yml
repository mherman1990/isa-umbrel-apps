releaseNotes: >-
  The twice-daily policy brief is now a single "Run policy brief now" button, and quiet days no
  longer save blank "no news" briefs — the twice-daily refresh still keeps Markets, News, alerts,
  and education cards current, it just stays silent when policy is quiet. Every report button now
  explains what it does in a line. The farmer market-education cards move to the Markets tab, next
  to the data they interpret. Under the hood, the Analyst Note now runs on Claude Opus 4.8 with
  extended thinking for sharper "around the corner" analysis, and every other report moves to Claude
  Sonnet 5 — a better model at the same cost. Informational and nonpartisan throughout.
