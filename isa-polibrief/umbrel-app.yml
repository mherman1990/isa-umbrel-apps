releaseNotes: >-
  A Markets dashboard and a homepage "Ask" box. The Markets tab now charts real history —
  biofuel feedstock market share (soybean oil vs. corn oil, canola, used cooking oil,
  tallow…), soybean price (Iowa vs. U.S.), U.S. crush, and ending stocks — each with a CSV
  download. USDA AMS adds the Iowa cash price + basis (free USDA_AMS_API_KEY). Search moved
  to the homepage ("Ask the Bean Brief"). Plus more sources: ag-news RSS and LCFS/Iowa
  agencies (CARB, Oregon, Washington, New Mexico, Iowa DNR). Also from 1.4.1: "Laws, Rules
  & Decisions" rename, in-place 👍/👎/track (no jump-to-top), permanent AI summaries, and
  Central-time timestamps.
