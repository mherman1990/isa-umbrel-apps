defaultPassword: ""
releaseNotes: >-
  Rebranded as "The Bean Brief" with the Iowa Soybean Association look and logo.
  New Focus Area watchlist: organize monitoring into issue buckets whose terms
  drive both what gets searched and how items are scored — no more per-source
  query lists (existing watchlists migrate automatically). New per-item "AI
  summary" button: a ≤500-word Claude summary of any linked rule and its
  significance, cached until the item's comment deadline. Email delivery of
  briefs; dedicated Watchlist and Sources pages; ISA color theme throughout.
