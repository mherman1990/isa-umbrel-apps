releaseNotes: >-
  USDA's WASDE soybean balance sheet is now live — it adds a stocks-to-use "how tight is supply"
  reading to the Markets signal board plus two new charts. A new Storylines panel on the home page
  auto-groups what's flowing in into the handful of ongoing threads that matter (biofuel credits,
  China trade, EU rules…), each with what changed and a dated timeline. Market figures cited in
  answers and briefs now link straight to their chart, and the Sources page shows each feed's value
  fairly by type. Plus reliability fixes so reports and summaries never come back truncated.
  Informational and nonpartisan throughout.
