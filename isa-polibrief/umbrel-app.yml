releaseNotes: >-
  Staff-focused refocus. The Bean Brief is now a sharper internal analysis tool: the Farmer update and
  Market Pulse reports are gone, the Market-education brief is aimed at ISA staff, and the analysis gives
  a direct, directional read instead of a hedged briefing. Ask the Bean Brief — and the Analyst Note —
  can now search the web to fill gaps in the stored data when a question needs it, citing web sources.
  The Markets tab is trimmed to the ten core charts; comment deadlines moved to the Laws, Rules &
  Decisions page (with their own set-aside archive); and the Map gains a layer of Iowa soybean crush and
  biodiesel plants. Code-only — just Update, no new keys. (Optional: WEB_SEARCH=off in .env turns web
  search off.)
