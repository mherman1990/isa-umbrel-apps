manifestVersion: 1
id: isa-polibrief
category: automation
name: The Bean Brief
version: "1.18.1"
tagline: Twice-daily policy briefs for Iowa soybean priorities
icon: https://raw.githubusercontent.com/mherman1990/isa-umbrel-apps/main/isa-polibrief/icon.png
description: >-
  The Bean Brief watches the Federal Register, Congress.gov, Regulations.gov,
  federal courts (CourtListener), seven state legislatures (via LegiScan), EU law
  (EUR-Lex), and the Iowa Administrative Bulletin for policy activity that matters
  to Iowa soybean farmers. Twice a day it filters everything against your Focus
  Areas, uses Claude to triage relevance and write a structured policy brief, and
  saves it here — with optional email delivery to a Teams channel or inbox.


  Organize monitoring into Focus Areas (issue buckets of search terms) right in
  the app, and open any stored item for an on-demand AI summary of the linked
  rule and why it matters. Set your API keys in .env in this app's data folder.
