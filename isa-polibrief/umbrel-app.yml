releaseNotes: >-
  Trend-aware answers and a new market-education brief. The "Ask the Bean Brief" box (and the
  memos) now read each market series over its full history — year-over-year, where today's value
  sits in its range, and whether it's seasonally normal — so you can ask "is this unusual for
  July?" and get a real answer. New "Market-education brief" (🎓): a plain-language, nonpartisan
  daily brief that explains what moved and WHY and teaches one market concept at a time, grounded
  only in the data — it explains, it never gives trading advice. The Markets tab adds Iowa drought
  coverage, corn price and the soybean:corn ratio, and Brazil's soybean crop — ten interactive
  charts now, each with a CSV download — plus four more ag-news feeds (farmdoc daily and others).
