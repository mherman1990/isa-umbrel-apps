releaseNotes: >-
  Workflow polish + more market data. "Items" is now "Laws, Rules & Decisions." 👍/👎 and
  📌 track update in place so the list no longer jumps to the top while you triage. AI
  summaries are permanent (re-opening returns the stored one; the 🧠 icon shows ✓ once
  stored). All timestamps render in Central time. New USDA AMS adapter puts the Iowa
  soybean cash price + basis on the Markets tab (free USDA_AMS_API_KEY). Ag-news RSS feeds
  (CFTC, USDA, EPA, Farm Progress, Agri-Pulse, ASA, RFA, Growth Energy, Clean Fuels, Iowa
  Soybean) now feed the News tab.
