releaseNotes: >-
  New "Studio" tab — a desktop chart workbench. Pick any market series from a catalog and chart them
  together, rebase or index them to compare, build a ratio, see a seasonality overlay, or shade a
  series' normal historical range. USDA report dates and market alerts show as flags right on the
  chart. Export a PNG for slides or Teams, download the CSV, or copy a link that reproduces the view.
  It's built for a desktop screen — the Markets tab still works everywhere. Nothing to set up and no
  new keys — just Update. Informational and nonpartisan throughout.
