releaseNotes: >-
  v2 foundation — a local political-intelligence layer built on the existing brief
  pipeline. New Entity Registry tracks Iowa officials, candidates, and parties and how
  each one publishes; state legislators and federal candidates import automatically
  (OpenStates + FEC). New sources: entity press/news RSS feeds and an email-intake
  channel that reads a dedicated collector inbox. New optional farmer-facing brief
  render (plain and nonpartisan) alongside the internal edition. New Registry page with
  channel-health monitoring, plus county/district geo resolution. Your existing
  watchlist and briefs are unchanged; all new sources stay off until you add their keys.
