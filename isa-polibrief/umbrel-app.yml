releaseNotes: >-
  Smarter answers, on-demand memos, and interactive charts. The homepage "Ask the Bean Brief"
  box now answers across the market data too — so you can connect a policy change to the
  numbers. New one-click memos: a Weekly memo, a Monthly review, and a plain-language,
  nonpartisan Farmer update (all built from the same engine over a chosen window). The Markets
  tab is now fully interactive — hover any chart to read the exact value and date, with proper
  axes — and adds three new data feeds: soybean export inspections and net export sales (a
  stand-in while the FAS export report is offline), Mississippi barge freight, plus U.S. crop
  condition (% good/excellent) and a U.S. Corn Belt weather read. Seven charts in all, each
  with a CSV download.
