releaseNotes: >-
  A behind-the-scenes speed and reliability release. The twice-daily refresh now runs several times
  faster: it no longer re-downloads two decades of weather history on every run, fetches its data
  sources side by side instead of one after another, and reuses work already done within a run.
  Nothing changes in how you use the app or what the briefs, signals, and charts show — just update,
  no setup or new keys needed. Informational and nonpartisan throughout.
