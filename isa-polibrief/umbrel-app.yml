releaseNotes: >-
  New "Map" tab — an interactive Iowa political map. County lines form the base and each legislative
  or congressional district lays translucent on top, shaded red or blue by the party that holds the
  seat. Hover a district to see its incumbent and 2026 challenger; switch between Iowa House, Senate
  and U.S. Congress boundaries, and toggle Soil & Water Conservation District and HUC8 watershed
  overlays. Builds on the Studio chart workbench added in 1.16.0. Nothing to set up and no new keys —
  just Update. Informational and nonpartisan throughout.
