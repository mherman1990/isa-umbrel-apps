releaseNotes: >-
  Four-tab portal + a new demand-side Markets pipeline. Everything is now organized by
  information class: Items (regulatory/legal only — the clean flow), News (collector
  newsletters + press, kept out of the policy brief), and a new Markets tab fed by free
  USDA NASS (price/production/stocks), EIA (soybean-oil biofuel feedstock + diesel), CFTC
  (fund positioning), and Open-Meteo (S. American weather) data. Added a news-source
  registry with a narrow/broad relevance split. Market and news items are kept out of the
  policy brief automatically. Add the free NASS_API_KEY and EIA_API_KEY in /data/.env to
  light up the Markets tab; your existing watchlist and briefs are unchanged.
