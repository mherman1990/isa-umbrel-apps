releaseNotes: >-
  A market signals board, tailored reports, and a new farmer education engine. The Markets tab
  opens with a bull/bear signals board and a "Coming up" panel of imminent USDA reports; charts
  default to the last six months with custom date ranges. Two one-click reports — an Analyst Note
  that reads around the corner and a time-sensitive Market Pulse — join the lineup, and the
  homepage gains market-education cards that turn seasonal and report-timing triggers into plain
  guidance (it teaches, it never advises). New data: the U.S. dollar and rates (FRED), Brazil's
  soybean production trend, corn price and the soybean:corn ratio, and CFTC fund positioning. The
  News digest now reads full articles, not just headlines, and there's a "what changed" alert feed,
  a data-freshness check, and a recoverable set-aside archive. Informational and nonpartisan
  throughout.
