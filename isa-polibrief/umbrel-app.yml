releaseNotes: >-
  Studio polish and fixes. Chart axes now show their units, exported PNGs include the title and a
  legend, the seasonality view highlights the current year against a 5-year average, and comparing
  series that use different units is clearer and safer. Several labels and dates were corrected, and
  annual series now show their full history by default. Desktop-only, as before. Code-only — nothing
  to set up and no new keys; just Update. Informational and nonpartisan throughout.
