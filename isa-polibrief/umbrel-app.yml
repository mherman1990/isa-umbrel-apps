releaseNotes: >-
  A new crop-weather engine reads how recent rainfall and heat compare to two decades of normals
  across the U.S. and South American soybean regions — weighted by where the beans grow and where
  the crop is in its season — and turns that into a bull/bear weather signal and a plain-English
  read in the reports and the Ask box, with two new weather-anomaly charts on the Markets tab. It
  now reasons weather → supply → price, not just "it's dry." Groundwork also lands for USDA's WASDE
  balance sheet (stocks-to-use) and a Barchart futures/basis feed, both ready to switch on.
  Informational and nonpartisan throughout.
