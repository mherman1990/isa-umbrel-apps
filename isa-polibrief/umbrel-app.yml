releaseNotes: >-
  The registry now knows Iowa's 2026 candidates — the challengers and statewide races (including
  Secretary of Agriculture) that weren't tracked before, so the monitor can watch everyone running.
  Two efficiency fixes as well: the "Ask the Bean Brief" box no longer re-runs (and re-charges) a
  question when you refresh or reopen a tab, and the saved AI item-summaries are now correctly
  treated as permanent. After updating, run one command on the Pi to load the candidates (see the
  release notes) — no new keys. Informational and nonpartisan throughout.
