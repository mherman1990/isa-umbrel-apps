releaseNotes: >-
  Readability and accessibility polish on the Home, News, and Laws/Rules/Decisions pages. News text no
  longer shows stray codes like "&#8217;" where an apostrophe or dash belongs, previews cut on whole
  words, the Laws table scrolls cleanly on a phone instead of pushing the page sideways, and the
  relevance buttons are labeled for screen readers. Code-only — nothing to set up and no new keys;
  just Update. Informational and nonpartisan throughout.
