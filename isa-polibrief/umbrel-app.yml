releaseNotes: >-
  Map tab refinements. The Soil & Water Conservation District overlay is gone (it just retraced the
  county lines). The HUC8 watershed overlay is now a passive background layer, so hovering always
  shows the district's candidate card — and with it on, that card also lists the watersheds the
  district spans (most cover several). County lines still form the base, districts still shade red
  or blue by the party that holds the seat. Nothing to set up and no new keys — just Update.
  Informational and nonpartisan throughout.
