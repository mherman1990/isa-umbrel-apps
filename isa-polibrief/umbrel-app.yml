releaseNotes: >-
  Tidier News and a sharper Markets board. The News tab now leads with the daily digest and the
  Storylines threads, and "What's flowing in" shows your 20 latest items with the rest a click away —
  and you can open any headline to read the full message right there. The Markets signal board is
  trimmed to the reads a grain marketer actually watches (added a Soy:Corn ratio; the biofuel-
  feedstock-share and dollar cards move to the charts/analysis, where they fit better). Plus two
  reliability fixes: run buttons now report a real failure instead of a false "started", and a
  mistyped time zone can no longer restart-loop the app. Just update — no setup or new keys.
  Informational and nonpartisan throughout.
