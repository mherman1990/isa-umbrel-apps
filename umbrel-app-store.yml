# Umbrel Community App Store manifest — must live at the repo ROOT (Umbrel can't read it from a
# subfolder). Add this repo's URL in Umbrel under Settings → App Store → Community App Stores.
# This single repo holds BOTH the app source (src/, docker/, the .github build Action) AND this
# store manifest; Umbrel reads this file + the isa-polibrief/ app folder and ignores everything else.

id: isa # store id — must be the prefix of every app id in this store
name: "ISA Apps"
